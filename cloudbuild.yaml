steps:

  # ── Paso 1: Compilar y testear el backend ────────────────────────
  - name: 'maven:3.9-eclipse-temurin-26'
    id: 'build-and-test'
    dir: 'Backend/parking'
    entrypoint: 'mvn'
    args:
      - 'clean'
      - 'package'
      - '-DskipTests=false'
      - '-q'

  # ── Paso 2: Análisis estático con SonarCloud ─────────────────────
  - name: 'maven:3.9-eclipse-temurin-26'
    id: 'sonar-analysis'
    dir: 'Backend/parking'
    entrypoint: 'mvn'
    args:
      - 'sonar:sonar'
      - '-Dsonar.token=$$SONAR_TOKEN'
    secretEnv:
      - 'SONAR_TOKEN'
    waitFor:
      - 'build-and-test'

  # ── Paso 3: Build imagen Docker ──────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    dir: 'Backend/parking'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/parking-repo/parking-backend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/parking-repo/parking-backend:latest'
      - '.'
    waitFor:
      - 'sonar-analysis'

  # ── Paso 4: Push al Artifact Registry ────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/parking-repo/parking-backend'
    waitFor:
      - 'build-image'

  # ── Paso 5: Deploy en Cloud Run ──────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'parking-backend'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/parking-repo/parking-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=$PROJECT_ID:us-central1:parking-db'

      # Secrets
      - '--set-secrets=DB_PASSWORD=DB_PASSWORD:latest'
      - '--set-secrets=DB_USER=DB_USER:latest'
      - '--set-secrets=DB_NAME=DB_NAME:latest'
      - '--set-secrets=CLOUD_SQL_CONNECTION=CLOUD_SQL_CONNECTION:latest'
      - '--set-secrets=CORS_ALLOWED_ORIGINS=CORS_ALLOWED_ORIGINS:latest'
      - '--set-secrets=RECAPTCHA_SECRET=RECAPTCHA_SECRET:latest'
      - '--set-secrets=MAIL_USERNAME=MAIL_USERNAME:latest'
      - '--set-secrets=MAIL_PASSWORD=MAIL_PASSWORD:latest'

      # Variables de entorno
      - '--set-env-vars=SPRING_PROFILES_ACTIVE=prod'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID'

      # Recursos
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--max-instances=2'
      - '--timeout=120'
    waitFor:
      - 'push-image'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/SONAR_TOKEN/versions/latest
      env: 'SONAR_TOKEN'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'